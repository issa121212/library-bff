services:

  # ─── ms-auth ───────────────────────────────────────────────────────────────
  postgres-auth:
    image: postgres:17
    container_name: postgres-auth
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_pass
    ports:
      - "5444:5432"
    volumes:
      - postgres-auth-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth_user -d auth_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  ms-auth:
    build: ./ms-auth
    container_name: ms-auth
    ports:
      - "8081:8081"
    environment:
      DB_HOST: postgres-auth
      DB_PORT: 5432
      DB_NAME: auth_db
      DB_USERNAME: auth_user
      DB_PASSWORD: auth_pass
      RSA_PRIVATE_KEY_PATH: /keys/private_key.pem
      RSA_PUBLIC_KEY_PATH: /keys/public_key.pem
    volumes:
      - ./ms-auth/keys:/keys:ro
    depends_on:
      postgres-auth:
        condition: service_healthy

  # ─── ms-book ───────────────────────────────────────────────────────────────
  postgres-book:
    image: postgres:17
    container_name: postgres-book
    environment:
      POSTGRES_DB: book_db
      POSTGRES_USER: book_user
      POSTGRES_PASSWORD: book_pass
    ports:
      - "5445:5432"
    volumes:
      - postgres-book-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U book_user -d book_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  ms-book:
    build: ./ms-book
    container_name: ms-book
    ports:
      - "8082:8082"
    environment:
      DB_HOST: postgres-book
      DB_PORT: 5432
      DB_NAME: book_db
      DB_USERNAME: book_user
      DB_PASSWORD: book_pass
    depends_on:
      postgres-book:
        condition: service_healthy
      ms-auth:
        condition: service_started

  # ─── ms-author ─────────────────────────────────────────────────────────────
  postgres-author:
    image: postgres:17
    container_name: postgres-author
    environment:
      POSTGRES_DB: author_db
      POSTGRES_USER: author_user
      POSTGRES_PASSWORD: author_pass
    ports:
      - "5446:5432"
    volumes:
      - postgres-author-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U author_user -d author_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  ms-author:
    build: ./ms-author
    container_name: ms-author
    ports:
      - "8083:8083"
    environment:
      DB_HOST: postgres-author
      DB_PORT: 5432
      DB_NAME: author_db
      DB_USERNAME: author_user
      DB_PASSWORD: author_pass
    depends_on:
      postgres-author:
        condition: service_healthy
      ms-auth:
        condition: service_started

  # ─── bff ───────────────────────────────────────────────────────────────────
  bff:
    build: ./bff
    container_name: bff
    ports:
      - "8080:8080"
    environment:
      JWK_SET_URI: http://ms-auth:8081/.well-known/jwks.json
      BOOK_SERVICE_URL: http://ms-book:8082
      AUTHOR_SERVICE_URL: http://ms-author:8083
    depends_on:
      ms-auth:
        condition: service_started
      ms-book:
        condition: service_started
      ms-author:
        condition: service_started

volumes:
  postgres-auth-data:
  postgres-book-data:
  postgres-author-data:
